<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="robots" content="noindex, nofollow">
  <title>Sign in</title>
  <style>
    :root {
      --bg: #f3f4f6;
      --card: #ffffff;
      --fg: #1f2328;
      --muted: #6b7280;
      --border: #d1d5db;
      --border-strong: #9ca3af;
      --primary: #2563eb;
      --primary-hover: #1d4ed8;
      --ring: rgba(37, 99, 235, .35);
      --error-bg: #fef2f2;
      --error-border: #fecaca;
      --error-fg: #b91c1c;
      --shadow: 0 1px 2px rgba(0,0,0,.04), 0 8px 24px rgba(0,0,0,.08);
    }
    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #0b0d10;
        --card: #15181d;
        --fg: #e6e8eb;
        --muted: #9aa3ad;
        --border: #2b2f36;
        --border-strong: #3a3f47;
        --primary: #3b82f6;
        --primary-hover: #60a5fa;
        --ring: rgba(59, 130, 246, .4);
        --error-bg: #2a1416;
        --error-border: #5b2326;
        --error-fg: #f7a8a8;
        --shadow: 0 1px 2px rgba(0,0,0,.3), 0 12px 32px rgba(0,0,0,.5);
      }
    }
    * { box-sizing: border-box; }
    html, body { height: 100%; }
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      background: var(--bg);
      color: var(--fg);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem 1rem;
      -webkit-font-smoothing: antialiased;
    }
    .card {
      width: 100%;
      max-width: 400px;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 14px;
      box-shadow: var(--shadow);
      padding: 2.25rem 2rem;
    }
    .brand {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 48px; height: 48px;
      margin: 0 auto 1.25rem;
      border-radius: 12px;
      background: var(--primary);
      color: #fff;
    }
    .brand svg { width: 26px; height: 26px; display: block; }
    h1 { font-size: 1.4rem; font-weight: 650; text-align: center; margin: 0 0 .35rem; letter-spacing: -.01em; }
    .subtitle { text-align: center; color: var(--muted); font-size: .9rem; margin: 0 0 1.75rem; }
    label { display: block; margin-bottom: .4rem; font-size: .82rem; font-weight: 550; color: var(--fg); }
    .field { margin-bottom: 1.1rem; }
    input[type=text], input[type=password] {
      width: 100%;
      padding: .65rem .8rem;
      border: 1px solid var(--border);
      border-radius: 9px;
      background: var(--card);
      color: var(--fg);
      font-size: .95rem;
      transition: border-color .15s, box-shadow .15s;
    }
    input::placeholder { color: var(--muted); opacity: .7; }
    input:hover { border-color: var(--border-strong); }
    input:focus { outline: none; border-color: var(--primary); box-shadow: 0 0 0 3px var(--ring); }
    button {
      width: 100%;
      padding: .7rem;
      border-radius: 9px;
      cursor: pointer;
      font-size: .95rem;
      font-weight: 600;
      transition: background .15s, border-color .15s, box-shadow .15s;
    }
    button:focus-visible { outline: none; box-shadow: 0 0 0 3px var(--ring); }
    .btn-primary { background: var(--primary); color: #fff; border: 1px solid transparent; }
    .btn-primary:hover { background: var(--primary-hover); }
    .btn-google {
      display: flex; align-items: center; justify-content: center; gap: .6rem;
      background: var(--card); color: var(--fg); border: 1px solid var(--border);
    }
    .btn-google:hover { border-color: var(--border-strong); background: rgba(127,127,127,.04); }
    .btn-google svg { width: 18px; height: 18px; }
    .alert {
      display: flex; gap: .55rem; align-items: flex-start;
      background: var(--error-bg); border: 1px solid var(--error-border); color: var(--error-fg);
      border-radius: 9px; padding: .65rem .8rem; margin-bottom: 1.25rem; font-size: .85rem; line-height: 1.4;
    }
    .alert svg { flex: 0 0 auto; width: 16px; height: 16px; margin-top: 1px; }
    .divider { display: flex; align-items: center; text-align: center; color: var(--muted); font-size: .78rem; margin: 1.4rem 0; text-transform: uppercase; letter-spacing: .06em; }
    .divider::before, .divider::after { content: ""; flex: 1; border-bottom: 1px solid var(--border); }
    .divider::before { margin-right: .9rem; }
    .divider::after { margin-left: .9rem; }
    .footer { text-align: center; color: var(--muted); font-size: .75rem; margin-top: 1.5rem; }
  </style>
</head>
<body>
  <main class="card">
    <div class="brand" aria-hidden="true">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <rect x="3" y="11" width="18" height="11" rx="2"></rect>
        <path d="M7 11V7a5 5 0 0 1 10 0v4"></path>
      </svg>
    </div>
    <h1>Sign in</h1>
    <p class="subtitle">Authenticate to continue</p>

    {{if .Error}}
    <div class="alert" role="alert">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="12" cy="12" r="10"></circle><line x1="12" y1="8" x2="12" y2="12"></line><line x1="12" y1="16" x2="12.01" y2="16"></line>
      </svg>
      <span>{{.Error}}</span>
    </div>
    {{end}}

    <form method="POST" action="/oauth2/authorize">
      <input type="hidden" name="client_id" value="{{.ClientID}}">
      <input type="hidden" name="redirect_uri" value="{{.RedirectURI}}">
      <input type="hidden" name="scope" value="{{.Scope}}">
      <input type="hidden" name="state" value="{{.State}}">
      <input type="hidden" name="code_challenge" value="{{.CodeChallenge}}">
      <input type="hidden" name="code_challenge_method" value="{{.CodeChallengeMethod}}">
      <div class="field">
        <label for="username">Username</label>
        <input id="username" name="username" type="text" autocomplete="username" placeholder="you@example.com" autofocus required>
      </div>
      <div class="field">
        <label for="password">Password</label>
        <input id="password" name="password" type="password" autocomplete="current-password" placeholder="••••••••" required>
      </div>
      <button type="submit" class="btn-primary">Sign in</button>
    </form>

    {{if .OIDCEnabled}}
    <div class="divider">or</div>
    <form method="POST" action="/oauth2/oidc/login">
      <input type="hidden" name="client_id" value="{{.ClientID}}">
      <input type="hidden" name="redirect_uri" value="{{.RedirectURI}}">
      <input type="hidden" name="scope" value="{{.Scope}}">
      <input type="hidden" name="state" value="{{.State}}">
      <input type="hidden" name="code_challenge" value="{{.CodeChallenge}}">
      <input type="hidden" name="code_challenge_method" value="{{.CodeChallengeMethod}}">
      <button type="submit" class="btn-google">
        <svg viewBox="0 0 18 18" aria-hidden="true">
          <path fill="#4285F4" d="M17.64 9.2c0-.64-.06-1.25-.16-1.84H9v3.48h4.84a4.14 4.14 0 0 1-1.8 2.72v2.26h2.92c1.71-1.57 2.68-3.89 2.68-6.62z"/>
          <path fill="#34A853" d="M9 18c2.43 0 4.47-.8 5.96-2.18l-2.92-2.26c-.81.54-1.84.86-3.04.86-2.34 0-4.32-1.58-5.03-3.7H.96v2.33A9 9 0 0 0 9 18z"/>
          <path fill="#FBBC05" d="M3.97 10.72a5.4 5.4 0 0 1 0-3.44V4.95H.96a9 9 0 0 0 0 8.1l3.01-2.33z"/>
          <path fill="#EA4335" d="M9 3.58c1.32 0 2.5.45 3.44 1.35l2.58-2.58A9 9 0 0 0 .96 4.95l3.01 2.33C4.68 5.16 6.66 3.58 9 3.58z"/>
        </svg>
        <span>Sign in with Google</span>
      </button>
    </form>
    {{end}}

    <p class="footer">Protected by OAuth 2.1</p>
  </main>
</body>
</html>
