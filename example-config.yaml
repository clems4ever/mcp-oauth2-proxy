server:
  port: 8080
  issuer: "https://localhost:8080"    # public base URL of this server (must be set explicitly; request headers are not trusted)
  jwt_secret: "change-me-in-production"
  token_ttl: 3600        # access token lifetime, seconds
  auth_code_ttl: 300     # authorization code / login session lifetime, seconds
  upstream_url: "http://localhost:9090" # MCP HTTP server – all unmatched requests are proxied here

# Human users for the authorization code flow.
# MCP clients (e.g. Claude) redirect the user here to authenticate.
users:
  - username: alice
    password: "$2a$10$Qjn9yuZMi4G2zgDXQk0vp.ig2f702c3GzH4GHVF4LZQnicuO00Q2O"  # alice-password
  - username: bob
    password: "$2a$10$9tKZfkDeRJsTgxyQ5X7.Rexdg2r84UmhkgAMep6JkYRubcjgxKSMK"  # bob-password

# Single client for the client_credentials grant.
application:
  client_id: "service-client-id"
  client_secret: "service-client-secret"
  allowed_scopes:
    - read
    - write
  redirect_uris:
    - "https://claude.ai/api/mcp/auth_callback"
