server:
  port: 8080
  issuer: "https://localhost:8080"    # public base URL of this server (must be set explicitly; request headers are not trusted)
  jwt_secret: "change-me-in-production"
  token_ttl: 3600           # access token lifetime, seconds
  auth_code_ttl: 300        # authorization code / login session lifetime, seconds
  refresh_token_ttl: 2592000 # refresh token lifetime, seconds (default 30 days)
  upstream_url: "http://localhost:9090" # MCP HTTP server – all unmatched requests are proxied here
  # debug: true                # dump every request proxied to the upstream (method, headers, body);
                               # sensitive headers are redacted. Leave off in production – verbose.

# Optional on-disk persistence. When set, refresh tokens are stored in a bbolt
# database so issued logins survive a restart. Omit for in-memory only (refresh
# tokens are then lost on restart). Auth codes and login sessions are always
# in-memory (they are short-lived).
#
# storage:
#   path: "/var/lib/mcp-oauth2/store.db"

# Human users for the authorization code flow.
# MCP clients (e.g. Claude) redirect the user here to authenticate.
#
# Passwords are stored as bcrypt hashes, never in plaintext. Generate one with:
#   htpasswd -bnBC 10 "" 'your-password' | tr -d ':\n'    # (apache2-utils)
#   caddy hash-password --plaintext 'your-password'        # (if you have Caddy)
#   python3 -c 'import bcrypt; print(bcrypt.hashpw(b"your-password", bcrypt.gensalt()).decode())'
# Paste the resulting "$2a$..." / "$2b$..." string as the password value below.
users:
  - username: alice
    password: "$2a$10$Qjn9yuZMi4G2zgDXQk0vp.ig2f702c3GzH4GHVF4LZQnicuO00Q2O"  # alice-password
  - username: bob
    password: "$2a$10$9tKZfkDeRJsTgxyQ5X7.Rexdg2r84UmhkgAMep6JkYRubcjgxKSMK"  # bob-password

# Single client for the client_credentials grant.
application:
  client_id: "service-client-id"
  client_secret: "service-client-secret"
  allowed_scopes:
    - read
    - write
  redirect_uris:
    - "https://claude.ai/api/mcp/auth_callback"

# Optional: log in with an OpenID Connect provider (e.g. Google) in addition to
# the password form above. Remove this block to disable OIDC login.
#
# Register an OAuth client with your provider and add this proxy's callback,
#   <issuer base URL>/oauth2/oidc/callback
# (e.g. https://localhost:8080/oauth2/oidc/callback), as an authorized redirect
# URI. For Google: APIs & Services → Credentials → OAuth client ID (Web app).
#
# oidc:
#   issuer: "https://accounts.google.com"   # OIDC issuer; discovery is automatic
#   client_id: "xxxxxxxx.apps.googleusercontent.com"
#   client_secret: "your-google-client-secret"
#   # redirect_url defaults to <server.issuer>/oauth2/oidc/callback; override if needed:
#   # redirect_url: "https://auth.example.com/oauth2/oidc/callback"
#   scopes: ["openid", "email", "profile"]  # optional; this is the default
#   allowed_emails:                          # only these verified emails may sign in
#     - alice@example.com
